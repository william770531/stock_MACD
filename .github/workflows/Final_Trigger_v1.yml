name: Stock_Daily_Bot

on:
  schedule:
    # 台灣週一至週五 08:05 (UTC 週日至週四 00:05)
    - cron: '5 0 * * 0-4'
  workflow_dispatch:
  # 加入這行強制誘發 GitHub 偵測
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install yfinance pandas requests

      - name: Run
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python stock_MACD.py
