name: Daily MACD Scanner

# 這裡稍微調整縮排與結構，強制讓 GitHub 重新解析
on:
  workflow_dispatch:
  schedule:
    # 台灣時間週一至週五 早上 08:10 (UTC 00:10)
    # 避開 08:00 整點的高峰期，排隊會快很多
    - cron: '10 0 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    # 固定時區環境
    env:
      TZ: Asia/Taipei
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install yfinance pandas requests

    - name: Run Script
      env:
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      run: python stock_MACD.py
