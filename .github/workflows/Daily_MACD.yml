name: Daily MACD Scanner

# 這裡稍微調整縮排與結構，強制讓 GitHub 重新解析
on:
  schedule:
    # 台灣時間 07:47 (UTC 23:47) 
    # 稍微提前避開 8 點的高峰期
    - cron: '47 23 * * 0-4'
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    # 固定時區環境
    env:
      TZ: Asia/Taipei
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install yfinance pandas requests

    - name: Run Script
      env:
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      run: python stock_MACD.py
