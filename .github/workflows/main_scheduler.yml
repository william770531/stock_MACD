name: Stock_Main_Scheduler

on:
  # 💡 只有 schedule 放在第一位，誘發 GitHub 偵測
  schedule:
    # 台灣週一至週五 08:05 (UTC 週日至週四 00:05)
    - cron: '5 0 * * 0-4'
  # 💡 保持手動按鈕作為備用
  workflow_dispatch:

jobs:
  stock_job:
    runs-on: ubuntu-latest
    # 💡 強制指定權限
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install yfinance pandas requests

      - name: Run
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python stock_MACD.py
