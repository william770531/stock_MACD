name: 股市盤前 AI 導航推播

on:
  schedule:
    # 設定時間為 UTC 00:00 (台灣時間早上 08:00)，每週一到週五執行
    - cron: '0 0 * * 1-5'
  workflow_dispatch: # 保留這個按鈕，讓你可以在 GitHub 網頁上手動點擊測試

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝所需套件
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests

      - name: 執行推播腳本
        env:
          # 這裡會自動去抓你在 GitHub Settings 裡設定的 Secrets
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python stock_MACD.py
