name: Daily MACD Scanner

on:
  schedule:
    # 台灣時間早上 8:00 執行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許手動執行

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 設定全域時區為台北
      TZ: Asia/Taipei

    steps:
    - name: 取得程式碼
      uses: actions/checkout@v4

    - name: 安裝 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 開啟快取，加速後續執行

    - name: 安裝套件
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests

    - name: 執行選股掃描
      # 如果你後續把 Token 存入 GitHub Secrets，可以這樣傳入：
      # env:
      #   TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      run: python stock_MACD.py
