name: Daily MACD Scanner

on:
  schedule:
    # 每天 UTC 時間 00:00 執行 (台灣時間早上 8:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 這個超好用！允許我們隨時手動點擊測試

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 取得程式碼 (Checkout)
      uses: actions/checkout@v3

    - name: 安裝 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝所需套件 (yfinance, pandas, requests)
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests

    - name: 執行選股掃描與推播
      run: python stock_MACD.py
