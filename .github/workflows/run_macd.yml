name: Daily MACD Scanner

on:
  schedule:
    # 台灣時間早上 8:00 執行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許手動執行

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 設定全域時區為台北
      TZ: Asia/Taipei

    steps:
    - name: 取得程式碼 (Checkout)
      uses: actions/checkout@v4  # 確保使用 v4
      with:
        fetch-depth: 0          # 取得完整歷史紀錄，避免抓到舊的 snapshot
        
    - name: 安裝 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 開啟快取，加速後續執行

    - name: 安裝套件
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests

    - name: 執行選股掃描與推播
      env:
        # 這裡就是把保險箱的東西「遞給」環境變數
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      run: python stock_MACD.py
